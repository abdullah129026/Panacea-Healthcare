# Netlify Configuration for Panacea Portal Frontend
# Deploy: https://app.netlify.com/sites/panacea-portal/deploys

[build]
# Build command
command = "npm run build"
# Output directory (Next.js static export)
publish = ".next"
# Node.js version
node_version = "20"

# Environment variables (set in Netlify UI dashboard)
[build.environment]
NEXT_PUBLIC_API_BASE_URL = "https://api.panacea.com/api"
NEXT_PUBLIC_SENTRY_DSN = ""

# Redirects & rewrites
[[redirects]]
# Catch-all for SPA routing
from = "/*"
to = "/"
status = 200

# Security headers
[[headers]]
for = "/*"
[headers.values]
# Prevent clickjacking
X-Frame-Options = "DENY"
# Prevent MIME type sniffing
X-Content-Type-Options = "nosniff"
# Enable XSS protection
X-XSS-Protection = "1; mode=block"
# Referrer policy
Referrer-Policy = "strict-origin-when-cross-origin"
# Content Security Policy
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' *.sentry.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' *.sentry.io *.api.panacea.com; frame-ancestors 'none'"

# Cache control
[[headers]]
for = "/_next/static/*"
[headers.values]
# Cache static assets for 1 year
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/static/*"
[headers.values]
# Cache static assets for 1 year
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*"
[headers.values]
# Don't cache HTML pages (reload on each visit)
Cache-Control = "public, max-age=0, must-revalidate"

# Preview deployment configuration
[context.production]
environment = { NEXT_PUBLIC_API_BASE_URL = "https://api.panacea.com/api", NEXT_PUBLIC_SENTRY_DSN = "" }

[context.deploy-preview]
environment = { NEXT_PUBLIC_API_BASE_URL = "https://staging-api.panacea.com/api", NEXT_PUBLIC_SENTRY_DSN = "" }

[context.branch-deploy]
environment = { NEXT_PUBLIC_API_BASE_URL = "https://staging-api.panacea.com/api", NEXT_PUBLIC_SENTRY_DSN = "" }
